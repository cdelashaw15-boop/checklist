<!DOCTYPE html>
<html lang="en">

<title>N736DJ Preflight Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: #0D0D0D; color: #F0EBE0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; overscroll-behavior: none; }
body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
.container { max-width: 900px; margin: 0 auto; padding: 1rem; }
input::placeholder { color: #555; }
input { font-family: inherit; -webkit-appearance: none; appearance: none; }
button { font-family: inherit; -webkit-appearance: none; appearance: none; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #2A2A2A; flex-wrap: wrap; gap: 8px; }
.title { font-family: 'Playfair Display', serif; font-size: 24px; color: #B8966A; font-weight: 500; line-height: 1.1; }
.flight-info { font-size: 12px; color: #888; margin-top: 4px; }
.header-actions { display: flex; gap: 6px; }
.btn { padding: 10px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #4A5C74; background: transparent; color: #F0EBE0; font-weight: 400; min-height: 40px; }
.btn-primary { background: #B8966A; border-color: #B8966A; color: #0D0D0D; font-weight: 500; }
.btn:active { opacity: 0.7; }

.setup-panel { display: none; background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.setup-panel.open { display: block; }
.setup-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: #F0EBE0; }
.setup-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.setup-inputs input { background: #0D0D0D; border: 1px solid #4A5C74; color: #F0EBE0; padding: 12px; border-radius: 6px; font-size: 15px; width: 100%; }
.setup-actions { display: flex; gap: 8px; }
.setup-actions .btn { flex: 1; }
.setup-actions .btn-cancel { flex: 0 0 auto; }

.tabs { display: flex; gap: 4px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
.tab-btn { background: transparent; color: #F0EBE0; border: 1px solid #4A5C74; padding: 10px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.tab-btn.active { background: #B8966A; color: #0D0D0D; border: none; font-weight: 500; }

.cl-section { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
.cl-header { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; min-height: 56px; }
.cl-header:active { background: #222; }
.cl-title-text { font-size: 16px; font-weight: 500; color: #B8966A; font-family: 'Playfair Display', serif; }
.cl-meta { font-size: 12px; color: #888; margin-top: 2px; }
.cl-body { display: none; border-top: 1px solid #2A2A2A; }
.cl-section.open .cl-body { display: block; }
.cl-section.open .cl-chev { transform: rotate(90deg); }
.cl-chev { color: #888; transition: transform 0.15s; font-size: 14px; flex-shrink: 0; margin-left: 8px; }
.cl-item { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid #222; cursor: pointer; min-height: 52px; user-select: none; }
.cl-item:last-child { border-bottom: none; }
.cl-item:active { background: #222; }
.cl-check { width: 26px; height: 26px; border: 2px solid #4A5C74; border-radius: 4px; margin-right: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; color: transparent; transition: all 0.1s; font-weight: 700; }
.cl-item.done .cl-check { background: #B8966A; border-color: #B8966A; color: #0D0D0D; }
.cl-item.done .cl-label { color: #666; text-decoration: line-through; }
.cl-item.done .cl-value { color: #555; }
.cl-text { flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 12px; min-width: 0; flex-wrap: wrap; }
.cl-label { font-size: 15px; color: #F0EBE0; }
.cl-value { font-size: 14px; color: #B8966A; font-weight: 500; text-align: right; }
.cl-section.complete .cl-title-text { color: #6FA86F; }
.cl-section.complete .cl-title-text::after { content: " ✓"; }

.progress-bar { height: 4px; background: #2A2A2A; border-radius: 2px; overflow: hidden; margin-top: 6px; width: 100px; }
.progress-fill { height: 100%; background: #B8966A; transition: width 0.2s; }

.em-section { background: #1A1A1A; border: 1px solid #4A2020; border-radius: 8px; margin-bottom: 10px; }
.em-header { padding: 12px 14px; background: #2A1515; border-radius: 8px 8px 0 0; font-weight: 500; color: #E89090; font-size: 15px; }
.em-line { display: flex; justify-content: space-between; padding: 10px 14px; gap: 12px; font-size: 14px; border-top: 1px solid #2A1515; }
.em-line .lbl { color: #F0EBE0; }
.em-line .val { color: #E89090; font-weight: 500; text-align: right; }

.vs-card { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 8px; }
.vs-row { display: flex; justify-content: space-between; padding: 14px; border-bottom: 1px solid #222; }
.vs-row:last-child { border-bottom: none; }
.vs-label { font-size: 15px; color: #F0EBE0; }
.vs-val { font-size: 15px; color: #B8966A; font-weight: 500; }

.hist-item { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
.hist-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.hist-tail { font-size: 16px; font-weight: 500; color: #B8966A; font-family: 'Playfair Display', serif; }
.hist-status { font-size: 12px; color: #888; }
.hist-route { font-size: 14px; color: #F0EBE0; margin-bottom: 4px; }
.hist-meta { font-size: 12px; color: #888; }
.hist-delete { background: transparent; border: 1px solid #4A2020; color: #E89090; padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 8px; }

.empty-state { text-align: center; padding: 3rem 1rem; color: #888; }
.empty-title { font-size: 16px; margin-bottom: 8px; }
.empty-sub { font-size: 13px; }

.warning-banner { background: #2A1515; border: 1px solid #4A2020; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; color: #E89090; }

@media (max-width: 480px) {
  .setup-inputs { grid-template-columns: 1fr; }
  .title { font-size: 20px; }
}
</style>
</head>

<div>
<div class="title">N736DJ Checklist</div>
<div class="flight-info" id="flight-info">No active flight</div>
</div>
<div class="header-actions">
<button class="btn" id="reset-btn">End flight</button>
<button class="btn btn-primary" id="new-btn">New flight</button>
</div>

<div class="setup-panel" id="setup-panel">
<div class="setup-title">Start a new flight</div>
<div class="setup-inputs">
<input id="tail-in" type="text" value="N736DJ" placeholder="Tail #" />
<input id="route-in" type="text" placeholder="Route (KACT to KPWG)" />

<div class="tabs">
<button class="tab-btn active" data-tab="checklists">Checklists</button>

let activeFlight = null;
let state = {};
let currentTab = "checklists";

const STORAGE_KEY = "n736dj_active";
const HISTORY_KEY = "n736dj_history";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      activeFlight = parsed.flight;
      state = parsed.state || {};
    }
  } catch (e) {}
}

function saveState() {
  if (!activeFlight) {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    return;
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ flight: activeFlight, state }));
  } catch (e) {}
}

function getHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveHistoryEntry(entry) {
  try {
    const history = getHistory();
    history.unshift(entry);
    if (history.length > 100) history.length = 100;
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch (e) {}
}

function deleteHistoryEntry(idx) {
  try {
    const history = getHistory();
    history.splice(idx, 1);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch (e) {}
}

function updateHeader() {
  const info = document.getElementById("flight-info");
  if (activeFlight) {
    const d = new Date(activeFlight.started);
    const dateStr = d.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    info.textContent = activeFlight.tail + " \u2022 " + (activeFlight.route || "no route") + " \u2022 " + dateStr;
  } else {
    info.textContent = "No active flight";
  }
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, function(c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function renderChecklists() {
  const c = document.getElementById("content");
  if (!activeFlight) {
    c.innerHTML = '<div class="empty-state"><div class="empty-title">No active flight</div><div class="empty-sub">Tap "New flight" to begin</div></div>';
    return;
  }
  let html = "";
  checklists.forEach(function(section, sIdx) {
    const total = section.items.length;
    let done = 0;
    section.items.forEach(function(_, iIdx) {
      if (state[sIdx + "_" + iIdx]) done++;
    });
    const complete = done === total;
    const pct = Math.round((done / total) * 100);
    html += '<div class="cl-section' + (complete ? " complete" : "") + '" data-section="' + sIdx + '">';
    html += '<div class="cl-header"><div>';
    html += '<div class="cl-title-text">' + escapeHtml(section.name) + '</div>';
    html += '<div class="cl-meta">' + done + ' of ' + total + '</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + pct + '%"></div></div>';
    html += '</div><span class="cl-chev">\u25B6</span></div>';
    html += '<div class="cl-body">';
    section.items.forEach(function(item, iIdx) {
      const checked = state[sIdx + "_" + iIdx];
      html += '<div class="cl-item' + (checked ? " done" : "") + '" data-key="' + sIdx + '_' + iIdx + '">';
      html += '<div class="cl-check">\u2713</div>';
      html += '<div class="cl-text"><span class="cl-label">' + escapeHtml(item[0]) + '</span><span class="cl-value">' + escapeHtml(item[1]) + '</span></div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  c.innerHTML = html;

  c.querySelectorAll(".cl-header").forEach(function(h) {
    h.addEventListener("click", function() { h.parentElement.classList.toggle("open"); });
  });
  c.querySelectorAll(".cl-item").forEach(function(item) {
    item.addEventListener("click", function(e) {
      e.stopPropagation();
      const key = item.dataset.key;
      state[key] = !state[key];
      item.classList.toggle("done");
      saveState();
      const section = item.closest(".cl-section");
      const sIdx = parseInt(section.dataset.section);
      const total = checklists[sIdx].items.length;
      let done = 0;
      checklists[sIdx].items.forEach(function(_, iIdx) { if (state[sIdx + "_" + iIdx]) done++; });
      section.querySelector(".cl-meta").textContent = done + " of " + total;
      section.querySelector(".progress-fill").style.width = Math.round((done/total)*100) + "%";
      section.classList.toggle("complete", done === total);
    });
  });
}

function renderEmergency() {
  const c = document.getElementById("content");
  let html = '<div class="warning-banner">Reference only. Does not replace the POH.</div>';
  emergencies.forEach(function(em) {
    html += '<div class="em-section">';
    html += '<div class="em-header">' + escapeHtml(em.name) + '</div>';
    em.lines.forEach(function(line) {
      html += '<div class="em-line"><span class="lbl">' + escapeHtml(line[0]) + '</span><span class="val">' + escapeHtml(line[1]) + '</span></div>';
    });
    html += '</div>';
  });
  c.innerHTML = html;
}

function renderVSpeeds() {
  const c = document.getElementById("content");
  let html = '<div class="vs-card">';
  vspeeds.forEach(function(v) {
    html += '<div class="vs-row"><span class="vs-label">' + escapeHtml(v[0]) + '</span><span class="vs-val">' + escapeHtml(v[1]) + '</span></div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

function renderHistory() {
  const c = document.getElementById("content");
  const history = getHistory();
  if (history.length === 0) {
    c.innerHTML = '<div class="empty-state"><div class="empty-title">No flight history yet</div><div class="empty-sub">Completed flights appear here</div></div>';
    return;
  }
  let html = "";
  history.forEach(function(d, idx) {
    const date = new Date(d.started).toLocaleString([], { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
    const completed = d.completed ? "Completed" : "Logged";
    html += '<div class="hist-item">';
    html += '<div class="hist-row"><div class="hist-tail">' + escapeHtml(d.tail) + '</div><div class="hist-status">' + completed + '</div></div>';
    html += '<div class="hist-route">' + escapeHtml(d.route || "No route logged") + '</div>';
    html += '<div class="hist-meta">' + date + ' \u2022 ' + (d.itemsChecked || 0) + ' items checked</div>';
    html += '<button class="hist-delete" data-idx="' + idx + '">Delete</button>';
    html += '</div>';
  });
  c.innerHTML = html;
  c.querySelectorAll(".hist-delete").forEach(function(btn) {
    btn.addEventListener("click", function() {
      if (confirm("Delete this flight from history?")) {
        deleteHistoryEntry(parseInt(btn.dataset.idx));
        renderHistory();
      }
    });
  });
}

function render() {
  if (currentTab === "checklists") renderChecklists();
  else if (currentTab === "emergency") renderEmergency();
  else if (currentTab === "vspeeds") renderVSpeeds();
  else if (currentTab === "history") renderHistory();
  updateHeader();
}

document.querySelectorAll(".tab-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    render();
  });
});

document.getElementById("new-btn").addEventListener("click", function() {
  document.getElementById("setup-panel").classList.add("open");
});
document.getElementById("cancel-btn").addEventListener("click", function() {
  document.getElementById("setup-panel").classList.remove("open");
});
document.getElementById("start-btn").addEventListener("click", function() {
  const tail = document.getElementById("tail-in").value.trim() || "N736DJ";
  const route = document.getElementById("route-in").value.trim();
  if (activeFlight) {
    let count = 0;
    Object.values(state).forEach(function(v) { if (v) count++; });
    saveHistoryEntry(Object.assign({}, activeFlight, { completed: false, itemsChecked: count, ended: Date.now() }));
  }
  activeFlight = { tail: tail, route: route, started: Date.now() };
  state = {};
  saveState();
  document.getElementById("setup-panel").classList.remove("open");
  document.getElementById("route-in").value = "";
  render();
});
document.getElementById("reset-btn").addEventListener("click", function() {
  if (!activeFlight) return;
  if (!confirm("End the current flight and log it to history?")) return;
  let count = 0;
  Object.values(state).forEach(function(v) { if (v) count++; });
  saveHistoryEntry(Object.assign({}, activeFlight, { completed: true, itemsChecked: count, ended: Date.now() }));
  activeFlight = null;
  state = {};
  saveState();
  render();
});

loadState();
render();
</script>
</body>
</html>
